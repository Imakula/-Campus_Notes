<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Notes | Share & Discover</title>
    <meta name="description"
        content="Upload and share your campus notes organized by subject. Access, download, and comment on course materials.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- AI Loading Screen -->
    <div id="ai-loader" class="ai-loader">
        <div class="loader-content">
            <div class="cyber-ring"></div>
            <h2 class="loader-text">Loading Campus Notes</h2>
        </div>
    </div>

    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside class="sidebar glass-panel">
        <div class="logo-container">
            <i class="fas fa-graduation-cap"></i>
            <h2>Campus Notes</h2>
        </div>
        <div class="sidebar-content" id="sidebar-filters">
            <!-- Sidebar items will be dynamically injected by app.js -->
        </div>
        <div class="sidebar-footer" id="sidebar-footer">
            <button class="btn" id="login-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
            <button class="btn primary-btn" id="upload-btn" style="display: none;">
                <i class="fas fa-cloud-upload-alt"></i> Upload Note
            </button>
            <button class="btn" id="logout-btn" style="display: none; margin-top: 10px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <a href="https://wa.me/qr/RDM722GXJDRPJ1" target="_blank" class="btn"
                style="margin-top: 10px; background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.3); color: #25D366; text-decoration: none;">
                <i class="fab fa-whatsapp"></i> Contact Us
            </a>
            <div
                style="margin-top: 24px; text-align: center; font-size: 11px; color: var(--text-secondary); line-height: 1.4;">
                &copy; 2026 Vihanga Imakula<br>All rights reserved.
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-wrapper" id="main-content">
        <!-- Dashboard/Subject views will be dynamically injected by app.js -->
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal-content glass-card">
            <button class="modal-close" id="close-modal"><i class="fas fa-times"></i></button>
            <h2 class="modal-title">Upload a Note</h2>

            <form id="upload-form">
                <div class="form-group">
                    <label for="note-title">Note Title</label>
                    <input type="text" id="note-title" class="form-control" placeholder="e.g. Chapter 1 Summary"
                        required>
                </div>

                <div class="form-group">
                    <label for="subject-select">Subject</label>
                    <select id="subject-select" class="form-control" required>
                        <option value="" disabled selected>Select a Subject</option>
                        <!-- Options dynamically injected by app.js -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="note-author">Author Name (Optional)</label>
                    <input type="text" id="note-author" class="form-control" placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label for="note-desc">Description</label>
                    <textarea id="note-desc" class="form-control"
                        placeholder="Briefly describe what this note covers..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="note-file">File</label>
                    <input type="file" id="note-file" class="form-control" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt"
                        required>
                </div>

                <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-paper-plane"></i> Submit Note
                </button>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal-content glass-card" style="text-align: center;">
            <button class="modal-close" id="close-login-modal"><i class="fas fa-times"></i></button>
            <h2 class="modal-title">Welcome Back</h2>
            <p style="margin-bottom: 24px; color: var(--text-secondary);">Sign in to comment or access admin features.
            </p>

            <button id="google-signin-btn" class="btn"
                style="width: 100%; background: white; color: #333; margin-bottom: 24px; border: 1px solid #ddd; font-weight: 500; display: flex; align-items: center; justify-content: center;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo"
                    style="width: 20px; height: 20px; margin-right: 12px;">
                Sign in with Google
            </button>

            <div style="position: relative; margin-bottom: 24px;">
                <hr style="border: none; border-top: 1px solid var(--border-color);">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 0 10px; font-size: 12px; color: var(--text-secondary);">Or
                    sign in with Email</span>
            </div>

            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="student@example.com"
                        required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter password"
                        required>
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
